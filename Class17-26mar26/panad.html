<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodPanda | no &copy</title>
    <link rel="stylesheet" href="./Public/pandaStyle.css" />
    <style>
      body {
        margin: 0px;
        padding: 0px;
      }
      .signup {
        text-align: center;
        align-items: center;
        height: 50px;
        padding: 10px;
        background-color: rgb(233, 36, 134);
      }
      button.signup {
        margin: 2px;
        height: 40px;
        text-align: center;
        padding: 10px;
        display: inline-flex;
        background-color: rgb(233, 36, 134);
        color: white;
        border: solid 1px white;
        border-radius: 8px;
        font-size: small;
        gap: 2px;
        cursor: pointer;
        transition: 0.5s;
      }
      button.signup:hover {
        background-color: aliceblue;
        color: black;
      }
      .navTop {
        display: flex;
        justify-content: center; /* centers horizontally */
        align-items: center;
      }

      .logo img {
        height: 40px;
      }
    </style>
  </head>
  <body>
    <div class="signup">
      <button class="signup">SIGN UP TO BE A RESTAURANT PARTNER</button>
      <button class="signup">SIGN UP TO BE A BUSINESS PARTNER</button>
    </div>

    <div class="navTop">
      <div class="logo">
        <img src="./Public/img/download.png" alt="" />
      </div>
      <nav></nav>
    </div>
  </body>
</html>
