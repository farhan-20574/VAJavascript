<h2>Question #4 Number Pyramid</h2>

    <script>
      let outputQ1 = "";
      let num = 6;
      for (let line = 1; line <= num; line++) {
        let row = "";

        //space
        for (let space = 1; space <= num - line; space++) {
          row += " ";
        }

        //stars
        for (let star = 1; star <= 2 * line - 1; star++) {
          row += "*";
        }
        outputQ1 += row + "\n";
      }

      

      document.getElementById("result").innerText = outputQ1;

      let outputQ2 = "";
      let tri = 6;
      for (let line = 1; line <= tri; line++) {
        let row = "";

      
        for (let star = 1; star <= 2 * line - 1; star++) {
          row += "*";
        }
        outputQ2 += row + "\n";
      }

      document.getElementById("result2").innerText = outputQ2;
