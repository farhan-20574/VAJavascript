  <body>
    <h3>for LOOP</h3>
    <h1 id="result"></h1>

    <script>
      let output = "";

      for (let i = 1; i <= 5; i++) {
        let line = "";

        for (let column = 0; column < i; column++) {
          line += "*";
        }

        output += line + "\n";
