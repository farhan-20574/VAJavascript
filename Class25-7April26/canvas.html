<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvas</title>
  </head>
  <body>
    <h2>Canvas</h2>

    <canvas
      id="gamecanvas"
      width="1000"
      height="800"
      style="border: 2px solid black"
    ></canvas>

    <script>
      // step canvas draw krne ke liye
      const canvas = document.getElementById("gamecanvas");
      const ctx = canvas.getContext("2d");

      // step 2 canvas pr object kese atta he
      ctx.fillStyle = "blue";
      ctx.fillRect(50, 50, 100, 80);

      // Step 3 canvas circle banane ke liye
      ctx.beginPath();
      ctx.arc(200, 150, 40, 0, Math.PI * 2);
      ctx.fillStyle = "red";
      ctx.fill();

      // Step 4 line draw krne ke liye
      ctx.beginPath();
      ctx.moveTo(1, 3);
      ctx.lineTo(300, 150);
      ctx.stroke();

      // step 5 move the object
      let x = 200;

        // function draw() {
        //   ctx.clearRect(0, 0, canvas.width, canvas.height);
        //   ctx.fillStyle = "green";
        //   ctx.fillRect(x, 100, 50, 50);

        //   x = x + 2;
        //   requestAnimationFrame(draw);
        // }

        // draw();

      // step 6 player move
      let y = 200;

      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight") {
          y += 10;
        }

        if (e.key === "ArrowLeft") {
          y -= 10;
        }
        if (e.key === "ArrowDown") {
          x += 10;
        }
         if (e.key === "ArrowUp") {
          x -= 10;
        }
      });
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillstyle = "orange";
        ctx.fillRect(y,x, 50, 50, 50);
        requestAnimationFrame(draw);
      }
      draw();
    </script>
  </body>
</html>
