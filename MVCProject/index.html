<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVC Learning App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    h2 {
      color: #667eea;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    form {
      display: grid;
      gap: 15px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 5px;
    }

    label {
      display: block;
      color: #555;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #764ba2;
    }

    button:active {
      transform: scale(0.98);
    }

    .edit-btn,
    .delete-btn {
      padding: 5px 10px;
      font-size: 14px;
      margin-right: 5px;
    }

    .delete-btn {
      background: #e74c3c;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    #user-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .user-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 5px;
      border-left: 4px solid #667eea;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
    }

    .user-card:hover {
      transform: translateY(-5px);
    }

    .user-card h3 {
      color: #333;
      margin-bottom: 10px;
    }

    .user-card p {
      color: #666;
      margin-bottom: 10px;
    }

    .error-message {
      padding: 12px 15px;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .success-message {
      padding: 12px 15px;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    #user-form {
      display: none;
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    .button-group button {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="user-container">
      <h1>MVC Learning App - User Manager</h1>

      <h2>Add New User</h2>
      <form id="user-form">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter user name" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter user email" required>
        </div>
        <div class="button-group">
          <button type="submit">Add User</button>
          <button type="button" onclick="document.getElementById('user-form').style.display='none'">Cancel</button>
        </div>
      </form>

      <button onclick="document.getElementById('user-form').style.display='block'" style="margin-bottom: 20px;">
        + Add New User
      </button>

      <h2>User List</h2>
      <div id="user-list"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
